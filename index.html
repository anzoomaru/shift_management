<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>筒井動物病院 - シフト管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Microsoft YaHei', 'Hiragino Sans', 'Meiryo', sans-serif;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #2c5aa0;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #6c757d;
            font-size: 14px;
        }
        .form-floating {
            margin-bottom: 15px;
        }
        .btn-login {
            background-color: #2c5aa0;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-login:hover {
            background-color: #1e3d6f;
            color: white;
        }
        .btn-observer {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid #2c5aa0;
            color: #2c5aa0;
            background: #ffffff;
        }
        .btn-observer:hover {
            background: #e9f0ff;
        }
        .error-message {
            color: #dc3545;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><img src="images/logo.png" alt="筒井動物病院 ロゴ" style="height: 28px; margin-right: 8px;"> 筒井動物病院</h1>
            <p>シフト管理システム</p>
        </div>
        
        <form id="loginForm">
            <div class="form-floating">
                <input type="text" class="form-control" id="email" placeholder="ログインID" required>
                <label for="email">ログインID</label>
            </div>
            
            <div class="form-floating">
                <input type="password" class="form-control" id="password" placeholder="パスワード" required>
                <label for="password">パスワード</label>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> ログイン
            </button>

            <button type="button" class="btn-observer mt-2" onclick="goObserverGuest()">
                <i class="fas fa-eye me-1"></i> 閲覧専用で入る
            </button>
            
            <div class="error-message" id="errorMessage">
                ログインIDまたはパスワードが正しくありません。
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'https://script.google.com/macros/s/AKfycbxagqfFwtPgc0kxn8U2uMIXu-1XeEut33xQfCkQ1pSGkLyfH4MI5Ae02yTmEuPyJEXHdQ/exec';
        function apiUrl(table, params = {}) {
            const query = new URLSearchParams({ table, ...params });
            return `${API_BASE}?${query.toString()}`;
        }

        async function loadEmployees() {
            try {
                const response = await fetch(apiUrl('employees'));
                const data = await response.json();
                return data.data || [];
            } catch (error) {
                console.error('従業員データ取得エラー:', error);
                return [];
            }
        }

        function normalizeRow(row) {
            const map = {};
            Object.keys(row || {}).forEach(key => {
                map[String(key).trim().toLowerCase()] = row[key];
            });
            return map;
        }

        function normalizeLoginId(value) {
            return String(value || '').replace(/[\s\u3000]+/g, '').trim().toLowerCase();
        }

        function normalizePassword(value) {
            return String(value || '').trim();
        }

        // デモ用のログイン機能
        function goObserverGuest() {
            sessionStorage.setItem('user', JSON.stringify({
                email: 'guest@observer',
                role: 'observer',
                name: '閲覧専用',
                position: '閲覧専用',
                employee_id: 'guest@observer',
                position_type: 'observer'
            }));
            window.location.href = 'observer.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            const employees = await loadEmployees();
            const normalizedId = normalizeLoginId(email);
            const row = employees.find(emp => {
                const normalized = normalizeRow(emp);
                const rowId = normalized.id ?? normalized.login_id ?? normalized.loginid ?? normalized.userid ?? normalized.user_id;
                return normalizeLoginId(rowId) === normalizedId;
            });
            const normalizedRow = row ? normalizeRow(row) : {};
            const rowPasswordRaw = normalizedRow.password ?? normalizedRow.pass ?? normalizedRow.pwd ?? '';
            const rowPassword = normalizePassword(rowPasswordRaw);

            if (row && rowPassword && rowPassword === normalizePassword(password)) {
                const positionType = normalizedRow.position_type || normalizedRow.positiontype || 'staff';
                const role = normalizedRow.role || (positionType === 'doctor' ? 'veterinarian' : (positionType === 'nurse' ? 'nurse' : 'admin'));
                const displayName = normalizedRow.name || row.name || row.id || normalizedRow.id || normalizedId;
                const positionLabel = normalizedRow.position || (role === 'nurse' ? '動物看護師' : (role === 'veterinarian' ? '獣医師' : '管理者'));
                const employeeId = normalizedRow.id || row.id || normalizedId;
                sessionStorage.setItem('user', JSON.stringify({
                    email: employeeId,
                    role,
                    name: displayName,
                    position: positionLabel,
                    employee_id: employeeId,
                    position_type: positionType
                }));

                switch(role) {
                    case 'admin':
                        window.location.href = 'admin.html';
                        break;
                    case 'veterinarian':
                    case 'nurse':
                        window.location.href = 'employee.html';
                        break;
                    case 'observer':
                        window.location.href = 'observer.html';
                        break;
                }
                return;
            }

            if (!employees.length) {
                const message = document.getElementById('errorMessage');
                message.textContent = '従業員データが取得できません。GASのURLやシート名を確認してください。';
                message.style.display = 'block';
                return;
            }

            // デモ用アカウント（シート未設定時のフォールバック）
            const demoAccounts = {
                'admin@admin.jp': { password: 'admin', role: 'admin', name: '管理者' },
                'test@test.jp': { password: 'test', role: 'nurse', name: 'テスト従業員', position: '動物看護師', employee_id: 'test@test.jp', position_type: 'nurse' },
                'aoyama@aoyama.jp': { password: 'aoyama', role: 'nurse', name: '青山', position: '動物看護師', employee_id: 'aoyama@aoyama.jp', position_type: 'nurse' },
                'tsutsui@tsutsui.jp': { password: 'tsutsui', role: 'veterinarian', name: '筒井崇', position: '獣医師', employee_id: 'tsutsui@tsutsui.jp', position_type: 'doctor' },
                'masaru@masaru.jp': { password: 'masaru', role: 'veterinarian', name: '院長', position: '獣医師', employee_id: 'masaru@masaru.jp', position_type: 'doctor' },
                'kai@kai.jp': { password: 'kai', role: 'veterinarian', name: '甲斐', position: '獣医師', employee_id: 'kai@kai.jp', position_type: 'doctor' },
                'shibata@shibata.jp': { password: 'shibata', role: 'nurse', name: '柴田', position: '動物看護師', employee_id: 'shibata@shibata.jp', position_type: 'nurse' },
                'admin@tsutsui.com': { password: 'admin123', role: 'admin', name: '管理者' },
                'vet1@tsutsui.com': { password: 'vet123', role: 'veterinarian', name: '筒井崇', position: '獣医師', employee_id: 'vet1@tsutsui.com', position_type: 'doctor' },
                'nurse1@tsutsui.com': { password: 'nurse123', role: 'nurse', name: '甲斐', position: '動物看護師', employee_id: 'nurse1@tsutsui.com', position_type: 'nurse' },
                'observer@observer': { password: 'observer123', role: 'observer', name: '観察者' }
            };

            const account = demoAccounts[email];

            if (account && account.password === password) {
                sessionStorage.setItem('user', JSON.stringify({
                    email: email,
                    role: account.role,
                    name: account.name,
                    position: account.position || (account.role === 'nurse' ? '動物看護師' : (account.role === 'veterinarian' ? '獣医師' : '管理者')),
                    employee_id: account.employee_id || email,
                    position_type: account.position_type || (account.role === 'nurse' ? 'nurse' : (account.role === 'veterinarian' ? 'doctor' : 'admin'))
                }));

                switch(account.role) {
                    case 'admin':
                        window.location.href = 'admin.html';
                        break;
                    case 'veterinarian':
                    case 'nurse':
                        window.location.href = 'employee.html';
                        break;
                    case 'observer':
                        window.location.href = 'observer.html';
                        break;
                }
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
